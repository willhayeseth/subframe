name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build packages (required for project references)
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - name: Type check all packages
        run: pnpm -r --if-present run typecheck

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - name: Build frontend
        run: pnpm --filter @workspace/subframe exec vite build
        env:
          NODE_ENV: production
          BASE_PATH: /
          VITE_API_BASE_URL: https://subframedev.replit.app

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - name: Build frontend
        run: pnpm --filter @workspace/subframe exec vite build
        env:
          NODE_ENV: production
          BASE_PATH: /
          VITE_API_BASE_URL: https://subframedev.replit.app
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
      - name: Build backend
        run: pnpm --filter @workspace/api-server run build
