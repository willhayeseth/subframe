name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build composite packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - run: pnpm exec tsc --noEmit -p tsconfig.json

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build composite packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - run: pnpm --filter @workspace/subframe exec vite build
        env:
          NODE_ENV: production
          BASE_PATH: /

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build composite packages
        run: |
          pnpm exec tsc --build packages/db
          pnpm exec tsc --build packages/api-zod
          pnpm exec tsc --build packages/api-client-react
      - run: pnpm --filter @workspace/api-server run build
